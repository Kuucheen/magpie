name: backend-ci

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - main
      - production-changes
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Race tests (critical packages)
        run: go test -race ./internal/auth ./internal/app/...

  backend-image-smoke:
    runs-on: ubuntu-latest
    needs: backend-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend runtime image
        run: |
          set -euo pipefail
          docker build \
            --build-arg BUILD_VERSION=ci-${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t magpie-backend-ci:${{ github.sha }} \
            .

      - name: Start dependency containers
        run: |
          set -euo pipefail
          docker network create magpie-ci

          docker run -d --name magpie-ci-postgres --network magpie-ci \
            -e POSTGRES_USER=magpie_user \
            -e POSTGRES_PASSWORD=magpie_password \
            -e POSTGRES_DB=magpie \
            postgres:17

          docker run -d --name magpie-ci-redis --network magpie-ci redis:7-alpine

          for i in {1..30}; do
            if docker exec magpie-ci-postgres pg_isready -U magpie_user -d magpie >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          docker run -d --name magpie-ci-backend --network magpie-ci -p 5656:5656 \
            -e PROXY_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef \
            -e JWT_SECRET=0123456789abcdef0123456789abcdef \
            -e STRICT_SECRET_VALIDATION=true \
            -e DB_HOST=magpie-ci-postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=magpie \
            -e DB_USERNAME=magpie_user \
            -e DB_PASSWORD=magpie_password \
            -e DB_SSLMODE=disable \
            -e DB_AUTO_MIGRATE=true \
            -e redisUrl=redis://magpie-ci-redis:6379 \
            -e ENABLE_PUBLIC_FIRST_ADMIN_BOOTSTRAP=true \
            -e ADMIN_BOOTSTRAP_TOKEN=ci-bootstrap-token \
            -e DISABLE_PUBLIC_REGISTRATION=false \
            magpie-backend-ci:${{ github.sha }} -production

      - name: Smoke test health and auth bootstrap/login
        run: |
          set -euo pipefail

          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:5656/healthz >/dev/null && curl -fsS http://127.0.0.1:5656/readyz >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:5656/healthz >/dev/null
          curl -fsS http://127.0.0.1:5656/readyz >/dev/null

          register_response=$(curl -fsS -X POST http://127.0.0.1:5656/api/register \
            -H 'Content-Type: application/json' \
            -H 'X-Admin-Bootstrap-Token: ci-bootstrap-token' \
            -d '{"email":"ci-admin@example.com","password":"StrongPass123!"}')

          register_token=$(printf "%s" "$register_response" | python -c 'import sys, json; print(json.load(sys.stdin).get("token", ""))')

          if [ -z "$register_token" ]; then
            echo "register response did not include token"
            echo "$register_response"
            exit 1
          fi

          login_response=$(curl -fsS -X POST http://127.0.0.1:5656/api/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci-admin@example.com","password":"StrongPass123!"}')

          login_token=$(printf "%s" "$login_response" | python -c 'import sys, json; print(json.load(sys.stdin).get("token", ""))')

          if [ -z "$login_token" ]; then
            echo "login response did not include token"
            echo "$login_response"
            exit 1
          fi

      - name: Capture backend logs on failure
        if: failure()
        run: |
          docker logs magpie-ci-backend || true
          docker logs magpie-ci-postgres || true
          docker logs magpie-ci-redis || true

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f magpie-ci-backend magpie-ci-postgres magpie-ci-redis >/dev/null 2>&1 || true
          docker network rm magpie-ci >/dev/null 2>&1 || true
