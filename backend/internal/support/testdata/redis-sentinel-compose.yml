        sentinel parallel-syncs mymaster 1
        EOF
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "36380:26379"

  redis-sentinel-3:
    image: redis:7-alpine
    depends_on:
      - redis-primary
      - redis-replica-1
