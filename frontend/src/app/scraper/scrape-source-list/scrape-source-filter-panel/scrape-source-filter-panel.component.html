<div class="filter-panel" [ngClass]="{'filter-panel--floating': floating}">
  <div class="filter-panel__header">
    <div>
      <div class="filter-panel__title">Filters</div>
      <div class="filter-panel__subtitle">Narrow sources by protocol and source proxy counts.</div>
    </div>
    <div class="filter-panel__actions">
      <p-button
        label="Clear"
        styleClass="p-button-text p-button-sm"
        (onClick)="clear.emit()"
      ></p-button>
      <p-button
        label="Apply"
        styleClass="p-button-success p-button-sm"
        (onClick)="apply.emit()"
      ></p-button>
    </div>
  </div>

  <div class="filter-panel__divider" aria-hidden="true"></div>

  <form [formGroup]="form" class="filter-panel__body">
    <div class="filter-section">
      <div class="filter-section__title">Protocol</div>
      <div class="filter-protocol-stack">
        <div class="filter-checkbox-row">
          <p-checkbox
            inputId="sourceFilterHttp"
            formControlName="http"
            [binary]="true"
            class="filter-checkbox"
          ></p-checkbox>
          <label for="sourceFilterHttp" class="filter-checkbox-label">HTTP</label>
        </div>
        <div class="filter-checkbox-row">
          <p-checkbox
            inputId="sourceFilterHttps"
            formControlName="https"
            [binary]="true"
            class="filter-checkbox"
          ></p-checkbox>
          <label for="sourceFilterHttps" class="filter-checkbox-label">HTTPS</label>
        </div>
      </div>
    </div>

    <div class="filter-panel__vertical-divider" aria-hidden="true"></div>

    <div class="filter-section">
      <div class="filter-section__title">Source Counts</div>
      <div class="filter-count-stack">
        <div class="filter-count-row">
          <label for="sourceFilterProxyCount" class="filter-count-label">Proxy Count</label>
          <p-select
            id="sourceFilterProxyCountOperator"
            formControlName="proxyCountOperator"
            [options]="countOperatorOptions"
            optionLabel="label"
            optionValue="value"
            class="filter-operator-select"
            panelStyleClass="scrape-source-filter-panel__overlay bg-gray-800 text-white"
            [appendTo]="'body'"
          ></p-select>
          <p-inputNumber
            id="sourceFilterProxyCount"
            formControlName="proxyCount"
            mode="decimal"
            [showButtons]="true"
            [min]="0"
            class="filter-count-input"
            inputStyleClass="w-full bg-gray-800 text-white border-gray-700 theme-focus"
          ></p-inputNumber>
        </div>

        <div class="filter-count-row">
          <label for="sourceFilterAliveCount" class="filter-count-label">Alive Proxy Count</label>
          <p-select
            id="sourceFilterAliveCountOperator"
            formControlName="aliveCountOperator"
            [options]="countOperatorOptions"
            optionLabel="label"
            optionValue="value"
            class="filter-operator-select"
            panelStyleClass="scrape-source-filter-panel__overlay bg-gray-800 text-white"
            [appendTo]="'body'"
          ></p-select>
          <p-inputNumber
            id="sourceFilterAliveCount"
            formControlName="aliveCount"
            mode="decimal"
            [showButtons]="true"
            [min]="0"
            class="filter-count-input"
            inputStyleClass="w-full bg-gray-800 text-white border-gray-700 theme-focus"
          ></p-inputNumber>
        </div>
      </div>
    </div>
  </form>
</div>
