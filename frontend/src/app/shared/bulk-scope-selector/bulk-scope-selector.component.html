<div class="bulk-scope-selector" [style.--bulk-scope-accent]="accentColor">
  <label
    [for]="allInputId"
    class="bulk-scope-option"
    [class.bulk-scope-option--active]="scope === 'all'"
  >
    <p-radioButton
      [name]="radioName"
      value="all"
      [ngModel]="scope"
      [inputId]="allInputId"
      (ngModelChange)="setScope($event)"
    ></p-radioButton>
    <span class="bulk-scope-option__copy">
      <span class="bulk-scope-option__title">{{ allTitle }}</span>
      <span class="bulk-scope-option__description">{{ allDescription }}</span>
    </span>
  </label>

  <label
    [for]="selectedInputId"
    class="bulk-scope-option"
    [class.bulk-scope-option--active]="scope === 'selected'"
    [class.bulk-scope-option--disabled]="selectedDisabled"
  >
    <p-radioButton
      [name]="radioName"
      value="selected"
      [ngModel]="scope"
      [inputId]="selectedInputId"
      [disabled]="selectedDisabled"
      (ngModelChange)="setScope($event)"
    ></p-radioButton>
    <span class="bulk-scope-option__copy">
      <span class="bulk-scope-option__title">{{ selectedTitle }}</span>
      <span class="bulk-scope-option__description">{{ selectedDescription }}</span>
    </span>
  </label>
</div>
